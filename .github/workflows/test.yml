name: Compilation & Unit Tests
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Compile TypeScript
    strategy:
      matrix:
        node: [ 20, 22, 24 ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run build

  tests:
    runs-on: ubuntu-latest
    name: Run unit tests
    strategy:
      matrix:
        node: [ 20, 22, 24 ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run test
