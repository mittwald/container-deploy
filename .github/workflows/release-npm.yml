name: Release and Publish to npm (OIDC)

on:
  workflow_dispatch:
    description: "Release npm package: bump version, tag, create GitHub release, publish to npm"

permissions:
  id-token: write
  contents: write

jobs:
  release-npm:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          always-auth: true # Ensure npm always sends auth (used with OIDC)

      - name: Configure git user for bot commit
        run: |
          git config user.name "release-bot"
          git config user.email "release-bot@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump minor version and create tag
        id: version
        run: |
          NEW_TAG=$(npm version minor -m "chore(release): v%s [skip ci]")
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Push version commit and tag
        run: |
          git push origin master
          git push origin --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish
        run: |
          npm publish --access=public --tag=latest --provenance
